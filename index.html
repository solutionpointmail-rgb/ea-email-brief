<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Email Brief</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#F1EFE8;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:1rem}
.loading{color:#888780;font-size:14px;text-align:center}
#app{width:100%;max-width:680px}
</style>
</head>
<body>
<div id="app"><div class="loading">Loading your email brief...</div></div>
<script>
const STORAGE_KEY = "email_triage_latest";
const ZAPIER_STORAGE_URL = "https://store.zapier.com/api/records?secret=c2510c6f-5168-4eb5-84e8-855caf15831f";

async function loadBrief() {
  try {
    const res = await fetch(ZAPIER_STORAGE_URL);
    const data = await res.json();
    const html = data.value || "";
    if (!html) {
      document.getElementById("app").innerHTML = "<div class='loading'>No brief available yet. Check back after 6am.</div>";
      return;
    }
    document.getElementById("app").innerHTML = html;
  } catch(e) {
    document.getElementById("app").innerHTML = "<div class='loading'>Could not load brief. Try refreshing.</div>";
  }
}

loadBrief();
</script>
</body>
</html>
