<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Email Brief</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#F1EFE8;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:1rem}
.loading{color:#888780;font-size:14px;text-align:center}
#app{width:100%;max-width:680px}
*{box-sizing:border-box;margin:0;padding:0}
.header{background:#fff;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;border:0.5px solid #e0ddd6}
.header h1{font-size:16px;font-weight:500;color:#2C2C2A}
.header p{font-size:13px;color:#888780;margin-top:2px}
.refresh-btn{font-size:12px;padding:6px 14px;border-radius:8px;border:0.5px solid #e0ddd6;background:#fff;cursor:pointer;color:#5F5E5A}
.refresh-btn:hover{background:#F1EFE8}
.summary-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.stat{background:#fff;border-radius:8px;padding:0.75rem 1rem;border:0.5px solid #e0ddd6}
.stat-label{font-size:12px;color:#888780;margin-bottom:4px}
.stat-val{font-size:20px;font-weight:500}
.section-label{font-size:11px;font-weight:500;color:#888780;text-transform:uppercase;letter-spacing:0.06em;padding:0.25rem 0 0.5rem}
.email-list{display:flex;flex-direction:column;gap:10px;margin-bottom:1rem}
.email-card{background:#fff;border:0.5px solid #e0ddd6;border-radius:12px;overflow:hidden}
.email-card.done{opacity:0.45}
.card-header{padding:0.9rem 1.1rem;display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.priority-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.card-meta{flex:1;min-width:0}
.card-from{font-size:14px;font-weight:500;color:#2C2C2A}
.card-subject{font-size:13px;color:#5F5E5A;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-summary{font-size:13px;color:#888780;margin-top:4px;line-height:1.5}
.priority-badge{flex-shrink:0;font-size:11px;padding:3px 8px;border-radius:8px;font-weight:500}
.card-body{border-top:0.5px solid #e0ddd6;padding:1.25rem;display:none}
.card-body.open{display:block}
.draft-label{font-size:12px;color:#888780;margin-bottom:8px;font-weight:500}
.draft-editor{width:100%;min-height:140px;font-size:14px;line-height:1.7;padding:0.85rem 1rem;border-radius:8px;border:0.5px solid #e0ddd6;background:#F9F8F4;color:#2C2C2A;resize:vertical;font-family:inherit}
.draft-editor:focus{outline:none;border-color:#888780}
.card-actions{display:flex;gap:8px;margin-top:12px}
.btn{font-size:13px;padding:6px 14px;border-radius:8px;border:0.5px solid #e0ddd6;background:transparent;cursor:pointer;color:#2C2C2A;font-family:inherit}
.btn:hover{background:#F1EFE8}
.btn-send{background:#E1F5EE;border-color:#1D9E75;color:#085041}
.btn-send:hover{background:#9FE1CB}
.btn-skip{color:#888780}
.remaining{font-size:13px;color:#888780}
.done-banner{text-align:center;padding:2rem;color:#888780;font-size:14px;display:none}
</style>
</head>
<body>
<div id="app"><div class="loading">Loading your email brief...</div></div>
<script>
const ZAPIER_STORAGE_URL = "https://store.zapier.com/api/records?secret=c2510c6f-5168-4eb5-84e8-855caf15831f&key=email_triage_html";
const ZAP1_WEBHOOK = "https://hooks.zapier.com/hooks/catch/5928257/43dbahw/";
const ZAP3_WEBHOOK = "https://hooks.zapier.com/hooks/catch/5928257/4398ht2/";

function toggleCard(id){
  var b = document.getElementById("body-"+id);
  b.classList.toggle("open");
}

function markDone(id, action){
  var card = document.getElementById("card-"+id);
  var draft = document.getElementById("draft-"+id);
  var draftText = draft ? draft.value : "";
  card.classList.add("done");
  document.getElementById("body-"+id).classList.remove("open");
  var rem = parseInt(document.getElementById("remaining").textContent);
  rem = Math.max(0, rem-1);
  document.getElementById("remaining").textContent = rem;
  if(rem === 0){ document.getElementById("done-banner").style.display = "block"; }
  if(action === "sent"){
    fetch(ZAP3_WEBHOOK, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({action:"send", card_id:id, draft:draftText})
    });
  }
}

function runRefresh(){
  var btn = document.querySelector(".refresh-btn");
  btn.textContent = "Running...";
  btn.disabled = true;
  fetch(ZAP1_WEBHOOK).then(function(){
    btn.textContent = "Refreshing - check back in ~3 mins";
    setTimeout(function(){
      btn.textContent = "Refresh inbox";
      btn.disabled = false;
    }, 180000);
  }).catch(function(){
    btn.textContent = "Refresh inbox";
    btn.disabled = false;
  });
}

async function loadBrief() {
  try {
    const res = await fetch(ZAPIER_STORAGE_URL);
    const data = await res.json();
    const html = data.email_triage_html || "";
    if(!html){
      document.getElementById("app").innerHTML = "<div class='loading'>No brief available yet. Check back after 6am.</div>";
      return;
    }
    document.getElementById("app").innerHTML = html;
  } catch(e) {
    document.getElementById("app").innerHTML = "<div class='loading'>Could not load brief. Try refreshing.</div>";
  }
}

loadBrief();
</script>
</body>
</html>
